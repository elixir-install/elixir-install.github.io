name: Test

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test_macos:
    name: Test - macOS
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Test
        run: |
          bash elixir-install elixir@1.17.2 otp@27.0.1
          export PATH=$HOME/.elixir-install/installs/otp/27.0.1/bin:$PATH
          export PATH=$HOME/.elixir-install/installs/elixir/1.17.2-otp-27/bin:$PATH
          elixir -e "IEx.Helpers.runtime_info(:system)"

  test_ubuntu:
    name: Test - Ubuntu
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install
        run: bash elixir-install elixir@1.17.2 otp@27.0.1

      - name: Test
        run: |
          export PATH=$HOME/.elixir-install/installs/otp/27.0.1/bin:$PATH
          export PATH=$HOME/.elixir-install/installs/elixir/1.17.2-otp-27/bin:$PATH
          elixir -e "IEx.Helpers.runtime_info(:system)"

  test_windows:
    name: Test - Windows
    runs-on: windows-2022
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Test
        run: |
          pwsh elixir-install.ps1 elixir@1.17.2 otp@27.0.1
          $env:PATH = "$env:LOCALAPPDATA\elixir-install\installs\otp\27.0.1\bin;$env:PATH"
          $env:PATH = "$env:LOCALAPPDATA\elixir-install\installs\elixir\1.17.2-otp-27\bin;$env:PATH"
          elixir -e "IEx.Helpers.runtime_info :system"
